<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="version" content="0.6.0" />
  <title>BHS practice - demo</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐴</text></svg>" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:wght@400;700&family=Aleo:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bg-main': '#FAF9F6',
            'bg-card': '#FFF3E1',
            'bg-element': '#FFFFFF',
            'action-primary': '#F0A0A8',
            'action-secondary': '#2D2D2D',
            'text-title': '#2A2A2A',
            'text-body': '#2A2A2A',
            'text-muted': '#7A7875',
            'text-on-primary': '#2A2A2A',
            'text-on-secondary': '#F0A0A8',
            'border-default': '#E1DFDC',
            'border-control': '#2A2A2A',
            'border-accent': '#F0A0A8',
            'validation-green': '#08AE66',
            'validation-red': '#AE081B',
            'sage': '#B4D4B8',
            'rose': '#F0A0A8',
          },
          fontFamily: {
            heading: ['"Inria Sans"', 'serif'],
            body: ['"Aleo"', 'serif'],
          },
          fontSize: {
            'xs': '12px',
            'sm': '14px',
            'base': '16px',
            'lg': '18px',
            'xl': '20px',
            '2xl': '24px',
            '3xl': '28px',
          },
          spacing: {
            'xs': '4px',
            'sm': '8px',
            'smd': '12px',
            'md': '16px',
            'lg': '24px',
            'xl': '32px',
            '2xl': '48px',
          },
          borderRadius: {
            'sm': '4px',
            'card-sm': '8px',
            'card': '16px',
            'pill': '48px',
          },
        }
      }
    }
  </script>

  <!-- Custom styles -->
  <style>
    body {
      background-color: #FAF9F6;
      font-family: 'Aleo', serif;
      color: #2A2A2A;
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0%   { width: 0%; }
      50%  { width: 100%; }
      100% { width: 0%; }
    }

    @keyframes gallop {
      0%, 100% { transform: translateY(0) scaleX(-1); }
      30%  { transform: translateY(-4px) scaleX(-1); }
      60%  { transform: translateY(0) scaleX(-1); }
      80%  { transform: translateY(-2px) scaleX(-1); }
    }

    .animate-scale-in {
      animation: scaleIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }

    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.1s; }
    .stagger-3 { animation-delay: 0.15s; }
    .stagger-4 { animation-delay: 0.2s; }
  </style>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useEffect, useRef } = React;

    const TOTAL_QUESTIONS = 10;

    // ─── Header ──────────────────────────────────────────────────
    function Header({ onHome }) {
      const [menuOpen, setMenuOpen] = useState(false);

      return (
        <>
          <header className="flex items-center justify-between mb-lg">
            <button onClick={onHome} className="font-heading font-bold text-xl text-text-title hover:text-action-primary transition-colors cursor-pointer flex items-center gap-smd">
              BHS practice
              <span className="text-xs font-body font-normal text-text-muted bg-border-default rounded-card-sm px-[8px] py-[2px]">demo</span>
            </button>
            <button
              onClick={() => setMenuOpen(true)}
              className="w-[36px] h-[36px] flex flex-col items-center justify-center gap-[5px] cursor-pointer"
              aria-label="Open menu"
            >
              <span className="block w-[20px] h-[2px] bg-text-title rounded-full" />
              <span className="block w-[20px] h-[2px] bg-text-title rounded-full" />
              <span className="block w-[20px] h-[2px] bg-text-title rounded-full" />
            </button>
          </header>

          {menuOpen && (
            <div className="fixed inset-0 z-50 flex justify-end" onClick={() => setMenuOpen(false)}>
              <div className="absolute inset-0 bg-black/40" style={{ backdropFilter: 'blur(2px)', WebkitBackdropFilter: 'blur(2px)' }} />
              <div
                className="relative w-[280px] h-full bg-bg-main shadow-lg animate-fade-in flex flex-col"
                onClick={(e) => e.stopPropagation()}
              >
                <div className="flex items-center justify-between px-lg py-lg border-b border-border-default">
                  <span className="font-heading font-bold text-lg text-text-title">Menu</span>
                  <button
                    onClick={() => setMenuOpen(false)}
                    className="w-[36px] h-[36px] flex items-center justify-center cursor-pointer text-text-muted hover:text-text-title transition-colors text-2xl leading-none"
                    aria-label="Close menu"
                  >
                    &times;
                  </button>
                </div>
                <nav className="flex flex-col px-lg py-md">
                  <button
                    onClick={() => { onHome(); setMenuOpen(false); }}
                    className="text-left font-body text-base text-text-body py-smd hover:text-action-primary transition-colors cursor-pointer"
                  >
                    Home
                  </button>
                  <div className="h-px bg-border-default" />
                  <button
                    className="text-left font-body text-base text-text-muted py-smd cursor-default"
                    disabled
                  >
                    My Progress
                  </button>
                  <div className="h-px bg-border-default" />
                  <button
                    className="text-left font-body text-base text-text-muted py-smd cursor-default"
                    disabled
                  >
                    Study Notes
                  </button>
                  <div className="h-px bg-border-default" />
                  <button
                    className="text-left font-body text-base text-text-muted py-smd cursor-default"
                    disabled
                  >
                    Settings
                  </button>
                </nav>
              </div>
            </div>
          )}
        </>
      );
    }

    // ─── API Helper ───────────────────────────────────────────────
    async function quizAPI(body) {
      const res = await fetch('/.netlify/functions/quiz', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok || data.error) {
        throw new Error(data.error || 'Something went wrong');
      }
      return data;
    }

    // ─── Image Bank ───────────────────────────────────────────────
    const IMAGE_BANK = {
      bay: { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/42/MaclintockVpic2.jpg/400px-MaclintockVpic2.jpg', alt: 'A bay horse' },
      chestnut: { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Avenger_-_Westphalian_horse.jpg/400px-Avenger_-_Westphalian_horse.jpg', alt: 'A chestnut horse' },
      grey: { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Lipizzaner_stallion_%282%29.jpg/400px-Lipizzaner_stallion_%282%29.jpg', alt: 'A grey horse' },
      piebald: { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Irish_Tinker_horse_2.JPG/400px-Irish_Tinker_horse_2.JPG', alt: 'A piebald horse' },
      blaze: { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Pferdeportrait_Blesse.JPG/400px-Pferdeportrait_Blesse.JPG', alt: 'A horse with a blaze marking' },
      star: { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Nokota_Horses_cropped.jpg/400px-Nokota_Horses_cropped.jpg', alt: 'A horse with a star marking' },
      saddle: { url: 'https://upload.wikimedia.org/wikipedia/commons/6/63/EnglishSaddleParts.png', alt: 'Parts of an English saddle' },
      bridle: { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Snafflealpha.jpg/400px-Snafflealpha.jpg', alt: 'A snaffle bridle' },
      hoofpick: { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/HoofPick.jpg/400px-HoofPick.jpg', alt: 'A hoof pick' },
      dandybrush: { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/HorseGroomingTools.jpg/400px-HorseGroomingTools.jpg', alt: 'Horse grooming tools' },
    };

    // ─── Horse Facts ──────────────────────────────────────────────
    const HORSE_FACTS = [
      "Horses can sleep both lying down and standing up.",
      "A horse's teeth take up more space in their head than their brain.",
      "Horses can run within hours of being born.",
      "The fastest recorded horse speed was 70.76 km/h.",
      "Horses have the largest eyes of any land mammal.",
      "A horse's heart weighs roughly 4.5 kg.",
      "Horses can see nearly 360 degrees around them.",
      "The oldest known horse lived to 62 years old.",
      "Horses drink at least 25 litres of water a day.",
      "A horse has about 205 bones in its skeleton.",
      "Horses produce around 10 gallons of saliva a day.",
      "The hoof is essentially a giant fingernail.",
      "Horses can't breathe through their mouths.",
      "A group of horses will not all sleep at the same time.",
      "Horses have 16 muscles in each ear.",
      "Horses have an almost 360-degree field of vision.",
      "A horse's brain weighs about half of a human's.",
      "Horses can gallop at around 44 km/h on average.",
      "The Arabian horse has one fewer vertebra than other breeds.",
      "Horses have a fixed pelvis so they can't do the splits.",
      "A foal's legs are already 90% of their adult length at birth.",
      "Horses can't vomit due to a strong one-way valve in their stomach.",
      "The frog of a horse's hoof helps pump blood back up the leg.",
      "Horses have been domesticated for over 5,000 years.",
      "A horse can see two different things at once, one from each eye.",
      "The gestation period for a horse is roughly 11 months.",
      "Horses use facial expressions to communicate with each other.",
      "A Thoroughbred's heart can weigh up to 10 kg.",
      "Horses naturally have a flight response and prefer to run from danger.",
      "Most horses are measured in hands. One hand equals 4 inches.",
    ];

    // ─── Loading Modal ────────────────────────────────────────────
    function LoadingModal() {
      const [factIndex, setFactIndex] = useState(0);
      const [shuffled] = useState(() =>
        [...HORSE_FACTS].sort(() => Math.random() - 0.5)
      );

      useEffect(() => {
        const timer = setInterval(() => {
          setFactIndex(prev => (prev + 1) % shuffled.length);
        }, 3500);
        return () => clearInterval(timer);
      }, [shuffled]);

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center" style={{ background: 'rgba(0, 0, 0, 0.5)', backdropFilter: 'blur(2.5px)', WebkitBackdropFilter: 'blur(2.5px)' }}>
          <div className="mx-6 rounded-card p-[3px]" style={{ maxWidth: '315px', width: '100%', background: 'linear-gradient(135deg, #B4D4B8, #F0A0A8, #FFF3E1)', boxShadow: '0 0 60px rgba(240, 160, 168, 0.4)' }}>
            <div className="rounded-[13px] p-6 pb-8 flex flex-col items-center gap-5" style={{ height: '185px', background: 'rgba(250, 249, 246, 0.9)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)' }}>
              <div className="flex-1 flex items-center justify-center">
                <p className="font-body font-semibold text-lg text-text-title text-center" style={{ maxWidth: '250px' }} key={factIndex}>
                  <span className="animate-fade-in block">{shuffled[factIndex]}</span>
                </p>
              </div>
              <div className="flex flex-col items-center w-full" style={{ maxWidth: '250px' }}>
                <span className="text-xl mb-[2px]" style={{ animation: 'gallop 0.8s ease-in-out infinite' }}>🐎</span>
                <div className="w-full h-2 rounded-pill border border-border-control overflow-hidden">
                  <div className="h-full rounded-pill" style={{ background: 'linear-gradient(160deg, rgba(180, 212, 184, 0.2) 15%, #B4D4B8 82%)', animation: 'shimmer 2.5s ease-in-out infinite' }} />
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── Button ────────────────────────────────────────────────────
    function Button({ children, onClick, variant = 'primary', disabled = false, className = '' }) {
      const base = 'font-heading font-bold text-lg px-xl py-smd rounded-pill transition-all duration-200 cursor-pointer select-none';
      const variants = {
        primary: 'bg-action-primary text-text-on-primary border border-[#D4838C] hover:brightness-95 active:scale-[0.97]',
        secondary: 'bg-action-secondary text-text-on-secondary hover:brightness-110 active:scale-[0.97]',
      };

      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`${base} ${variants[variant]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}
        >
          {children}
        </button>
      );
    }

    // ─── Progress Bar ──────────────────────────────────────────────
    function ProgressBar({ current, total }) {
      return (
        <div className="flex items-center gap-sm">
          {Array.from({ length: total }, (_, i) => (
            <div
              key={i}
              className={`h-[6px] flex-1 rounded-pill transition-all duration-300 ${
                i < current ? 'bg-action-primary' : i === current ? 'bg-border-accent' : 'bg-border-default'
              }`}
            />
          ))}
        </div>
      );
    }

    // ─── Answer Option (MC) ───────────────────────────────────────
    function AnswerOption({ text, index, selected, onClick }) {
      const labels = ['A', 'B', 'C', 'D'];
      const isSelected = selected === index;

      return (
        <button
          onClick={() => onClick(index)}
          className={`w-full flex items-center gap-sm px-md py-lg rounded-card-sm border transition-all duration-200 text-left cursor-pointer active:scale-[0.98] ${
            isSelected
              ? 'bg-[rgba(42,42,42,0.04)] border-border-control'
              : 'bg-bg-element border-border-default hover:border-border-accent'
          }`}
        >
          <span className={`flex-shrink-0 w-[23px] h-[23px] rounded-full flex items-center justify-center font-body font-semibold text-sm border ${
            isSelected
              ? 'bg-action-secondary border-action-secondary text-bg-element'
              : 'border-border-default text-text-body'
          }`}>
            {labels[index]}
          </span>
          <span className="font-body font-semibold text-lg text-text-title">{text}</span>
        </button>
      );
    }

    // ─── Question Input (Open) ────────────────────────────────────
    function QuestionInput({ onSubmit, isLast }) {
      const [value, setValue] = useState('');
      const textareaRef = useRef(null);

      useEffect(() => {
        if (textareaRef.current) textareaRef.current.focus();
      }, []);

      function handleSubmit(e) {
        e.preventDefault();
        if (value.trim()) onSubmit({ type: 'open', text: value.trim() });
      }

      return (
        <form onSubmit={handleSubmit} className="flex flex-col gap-smd">
          <textarea
            ref={textareaRef}
            value={value}
            onChange={(e) => setValue(e.target.value)}
            placeholder="Type your answer..."
            rows={3}
            className="w-full px-md py-smd rounded-card-sm border border-border-default bg-bg-element font-body text-base text-text-body placeholder:text-text-muted resize-none focus:outline-none focus:border-border-accent transition-colors"
          />
          <Button
            onClick={handleSubmit}
            disabled={!value.trim()}
            className="w-full"
          >
            {isLast ? 'Submit & See Results' : 'Submit & Next'}
          </Button>
        </form>
      );
    }

    // ─── MC Question Input ────────────────────────────────────────
    function MCInput({ options, onSubmit, isLast }) {
      const [selected, setSelected] = useState(null);

      function handleSubmit() {
        if (selected !== null) onSubmit({ type: 'mc', selectedIndex: selected });
      }

      return (
        <div className="flex flex-col gap-smd">
          <div className="flex flex-col gap-smd">
            {options.map((option, i) => (
              <AnswerOption
                key={i}
                text={option}
                index={i}
                selected={selected}
                onClick={setSelected}
              />
            ))}
          </div>
          <Button
            onClick={handleSubmit}
            disabled={selected === null}
            className="w-full"
          >
            {isLast ? 'Submit & See Results' : 'Submit & Next'}
          </Button>
        </div>
      );
    }

    // ─── Question Card ─────────────────────────────────────────────
    function QuestionCard({ questionData, questionIndex, totalQuestions, onSubmitAnswer }) {
      const isLast = questionIndex === totalQuestions - 1;
      const isMC = questionData.type === 'mc';

      return (
        <div className="animate-scale-in">
          <div className="mb-lg">
            <ProgressBar current={questionIndex} total={totalQuestions} />
            <div className="flex items-center justify-between mt-smd">
              <span className="font-body text-sm text-text-muted">
                Question {questionIndex + 1} of {totalQuestions}
              </span>
              <span className="font-body text-xs text-text-muted bg-bg-card px-sm py-xs rounded-pill">
                {questionData.topic}
              </span>
            </div>
          </div>

          <h2 className="font-heading font-bold text-2xl text-text-title mb-lg leading-snug">
            {questionData.question}
          </h2>

          {questionData.imageId && IMAGE_BANK[questionData.imageId] && (
            <div className="mb-lg rounded-card-sm overflow-hidden border border-border-default">
              <img
                src={IMAGE_BANK[questionData.imageId].url}
                alt={IMAGE_BANK[questionData.imageId].alt}
                className="w-full h-auto"
                loading="eager"
              />
            </div>
          )}

          {isMC ? (
            <MCInput options={questionData.options} onSubmit={onSubmitAnswer} isLast={isLast} />
          ) : (
            <QuestionInput onSubmit={onSubmitAnswer} isLast={isLast} />
          )}
        </div>
      );
    }

    // ─── Intro Messages ─────────────────────────────────────────────
    const TITLE_MESSAGES = [
      'Welcome WeEz',
      'BunBunita!',
      'Oh hey baby butters',
      'Whats up pooper?',
      "Shouldn't you be watching a webinar?",
      'You look so pretty!',
      'Little quizzy Weezikins?',
      'WeEzzzzzz!',
      '12 atoms and a babys bib...',
      'Your boyf is HAWT',
    ];

    const INTRO_MESSAGES = [
      "Got your tea? Choccy in hand? Then let's do some practice for your BHS Stage 1 exam.",
      "Let's practice! Then get some choc!",
      "Why not get Simmy to make you some tea before you start your quiz practice?",
      "Quiz > choccy > quiz > choccy (repeat)",
      "At least this isn't a webinar",
      "If you hit 2/3 you win a kiss from SIMMY",
      "Somebody loves you very much, you know",
      "POOOOOOP",
    ];

    // ─── Start Screen ──────────────────────────────────────────────
    function StartScreen({ onStart }) {
      const [title] = useState(() =>
        TITLE_MESSAGES[Math.floor(Math.random() * TITLE_MESSAGES.length)]
      );
      const [message] = useState(() =>
        INTRO_MESSAGES[Math.floor(Math.random() * INTRO_MESSAGES.length)]
      );

      return (
        <div className="animate-scale-in text-center">
          <div className="mb-2xl">
            <span className="text-[64px] leading-none block mb-lg">🐴</span>
            <h1 className="font-heading font-bold text-3xl text-text-title mb-smd">
              {title}
            </h1>
            <p className="font-body text-lg text-text-muted max-w-[300px] mx-auto leading-relaxed">
              {message}
            </p>
          </div>

          <div className="bg-bg-card rounded-card p-lg mb-xl text-left border border-border-default">
            <h2 className="font-heading font-bold text-xl text-text-title mb-xs">Setup</h2>
            <p className="font-body text-sm text-text-muted mb-lg">Will be configurable but just static for now</p>

            <div className="flex items-center justify-between py-smd">
              <span className="font-heading font-bold text-base text-text-title">Questions</span>
              <span className="font-body text-sm text-text-body bg-[#C5E2E9] border border-[#B8CCE0] rounded-card-sm px-sm py-xs">{TOTAL_QUESTIONS}</span>
            </div>
            <div className="h-px bg-border-default" />
            <div className="flex items-center justify-between py-smd">
              <span className="font-heading font-bold text-base text-text-title">Type</span>
              <div className="flex gap-xs">
                <span className="font-body text-sm text-text-body bg-[#C5E2E9] border border-[#B8CCE0] rounded-card-sm px-sm py-xs flex items-center gap-xs">
                  Multiple choice <span className="text-text-muted text-xs">&times;</span>
                </span>
                <span className="font-body text-sm text-text-body bg-[#C5E2E9] border border-[#B8CCE0] rounded-card-sm px-sm py-xs flex items-center gap-xs">
                  Open <span className="text-text-muted text-xs">&times;</span>
                </span>
              </div>
            </div>
            <div className="h-px bg-border-default" />
            <div className="flex items-center justify-between py-smd">
              <span className="font-heading font-bold text-base text-text-title">Topics</span>
              <span className="font-body text-sm text-text-body bg-[#C5E2E9] border border-[#B8CCE0] rounded-card-sm px-sm py-xs">Random BHS Stage 1</span>
            </div>
          </div>

          <Button onClick={onStart} className="w-full">
            Let's go!
          </Button>
        </div>
      );
    }

    // ─── Result Accordion Item ─────────────────────────────────────
    function ResultItem({ question, result, index }) {
      const [open, setOpen] = useState(false);

      const styles = {
        correct: { border: 'border-sage', stripe: 'bg-sage', bg: 'bg-[rgba(180,212,184,0.2)]', label: 'Correct' },
        partial: { border: 'border-bg-card', stripe: 'bg-bg-card', bg: 'bg-[rgba(255,243,225,0.4)]', label: 'Partial' },
        incorrect: { border: 'border-rose', stripe: 'bg-[#E08C95]', bg: 'bg-[rgba(240,160,168,0.2)]', label: 'Not quite' },
      };
      const s = styles[result.verdict] || styles.incorrect;

      const verdictBadgeStyles = {
        correct: 'bg-sage text-text-title',
        partial: 'bg-bg-card text-text-title',
        incorrect: 'bg-[rgba(240,160,168,0.4)] text-text-title',
      };

      return (
        <div
          className={`animate-fade-in flex overflow-hidden rounded-card-sm border ${s.border} cursor-pointer`}
          style={{ animationDelay: `${index * 0.08}s`, opacity: 0 }}
          onClick={() => setOpen(!open)}
        >
          <div className={`w-[12px] flex-shrink-0 ${s.stripe}`} />
          <div className={`flex-1 flex flex-col px-md py-lg border-l border-border-default ${s.bg}`}>
            <div className="flex items-start justify-between gap-sm">
              <div className="flex-1 min-w-0">
                <p className="font-body text-xs text-text-muted mb-xs">{question.topic}</p>
                <p className="font-body font-semibold text-base text-text-title leading-snug">
                  {question.question}
                </p>
              </div>
              <div className="flex items-center gap-xs flex-shrink-0 mt-xs">
                <span className={`font-body text-xs font-bold px-sm py-xs rounded-pill ${verdictBadgeStyles[result.verdict]}`}>
                  {s.label}
                </span>
                <span className={`text-text-muted text-sm transition-transform duration-200 ${open ? 'rotate-180' : ''}`}>
                  &#9662;
                </span>
              </div>
            </div>

            {open && (
              <div className="animate-fade-in mt-smd flex flex-col gap-sm">
                <div className="pt-smd border-t border-border-default">
                  <p className="font-body text-xs text-text-muted mb-xs font-semibold">Your answer</p>
                  <p className="font-body text-base text-text-body leading-relaxed">{result.userAnswer}</p>
                </div>
                <div>
                  <p className="font-body text-xs text-text-muted mb-xs font-semibold">Feedback</p>
                  <p className="font-body text-base text-text-body leading-relaxed">{result.feedback}</p>
                </div>
                {result.verdict !== 'correct' && (
                  <div>
                    <p className="font-body text-xs text-text-muted mb-xs font-semibold">Correct answer</p>
                    <p className="font-body text-base text-text-body leading-relaxed">{result.correctAnswer}</p>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── Results Screen ────────────────────────────────────────────
    function ResultsScreen({ questions, results, onRestart }) {
      const correctCount = results.filter(r => r.verdict === 'correct').length;
      const partialCount = results.filter(r => r.verdict === 'partial').length;
      const total = results.length;

      const score = correctCount + (partialCount * 0.5);
      const emoji = score >= total ? '🎉' : score >= total / 2 ? '👏' : '📚';
      const message = score >= total
        ? "Perfect score — you're ready!"
        : score >= total / 2
        ? 'Good effort, keep practising!'
        : "Keep going — you'll get there!";

      return (
        <div className="animate-scale-in">
          <div className="text-center mb-xl">
            <span className="text-[48px] leading-none block mb-md">{emoji}</span>
            <h1 className="font-heading font-bold text-3xl text-text-title mb-sm">
              {correctCount} of {total} correct
            </h1>
            {partialCount > 0 && (
              <p className="font-body text-sm text-text-muted mb-xs">
                ({partialCount} partially correct)
              </p>
            )}
            <p className="font-body text-base text-text-muted">{message}</p>
            <p className="font-body text-xs text-text-muted mt-sm">Tap a question to see details</p>
          </div>

          <div className="flex flex-col gap-smd mb-xl">
            {results.map((result, i) => (
              <ResultItem
                key={i}
                question={questions[i]}
                result={result}
                index={i}
              />
            ))}
          </div>

          <Button onClick={onRestart} className="w-full">
            Try Again
          </Button>
        </div>
      );
    }

    // ─── Error Screen ──────────────────────────────────────────────
    function ErrorScreen({ message, onRetry }) {
      return (
        <div className="animate-scale-in text-center py-2xl">
          <span className="text-[48px] leading-none block mb-md">😕</span>
          <h2 className="font-heading font-bold text-2xl text-text-title mb-smd">
            Something went wrong
          </h2>
          <p className="font-body text-sm text-text-muted mb-xl max-w-[300px] mx-auto">
            {message}
          </p>
          <Button onClick={onRetry}>Try Again</Button>
        </div>
      );
    }

    // ─── App ───────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState('start');   // start | quiz | results | error
      const [currentQ, setCurrentQ] = useState(0);
      const [questions, setQuestions] = useState([]);
      const [userAnswers, setUserAnswers] = useState([]);  // { type, text|selectedIndex }
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');

      // Check MC answers client-side, send open-ended to API
      const evaluateAnswers = useCallback(async (qs, answers) => {
        const finalResults = new Array(qs.length);

        // Evaluate MC locally
        const openItems = [];
        const openIndices = [];
        qs.forEach((q, i) => {
          const ans = answers[i];
          if (q.type === 'mc') {
            const correct = ans.selectedIndex === q.correctIndex;
            finalResults[i] = {
              verdict: correct ? 'correct' : 'incorrect',
              feedback: q.explanation,
              correctAnswer: q.options[q.correctIndex],
              userAnswer: q.options[ans.selectedIndex],
            };
          } else {
            openItems.push({
              question: q.question,
              expectedAnswer: q.expectedAnswer,
              userAnswer: ans.text,
            });
            openIndices.push(i);
          }
        });

        // Send open-ended to API if any
        if (openItems.length > 0) {
          const data = await quizAPI({ action: 'check-all', items: openItems });
          data.results.forEach((r, j) => {
            const i = openIndices[j];
            finalResults[i] = { ...r, userAnswer: answers[i].text };
          });
        }

        return finalResults;
      }, []);

      const handleStart = useCallback(async () => {
        setLoading(true);
        setCurrentQ(0);
        setQuestions([]);
        setUserAnswers([]);
        setResults([]);
        try {
          const data = await quizAPI({ action: 'generate-all', count: TOTAL_QUESTIONS });
          setQuestions(data.questions);
          setLoading(false);
          setScreen('quiz');
        } catch (err) {
          setLoading(false);
          setErrorMsg(err.message);
          setScreen('error');
        }
      }, []);

      const handleSubmitAnswer = useCallback(async (answer) => {
        const newAnswers = [...userAnswers, answer];
        setUserAnswers(newAnswers);

        if (currentQ < TOTAL_QUESTIONS - 1) {
          setCurrentQ(prev => prev + 1);
        } else {
          // Last question — evaluate all
          setLoading(true);
          try {
            const finalResults = await evaluateAnswers(questions, newAnswers);
            setResults(finalResults);
            setLoading(false);
            setScreen('results');
          } catch (err) {
            setLoading(false);
            setErrorMsg(err.message);
            setScreen('error');
          }
        }
      }, [userAnswers, currentQ, questions, evaluateAnswers]);

      const handleHome = useCallback(() => {
        setScreen('start');
        setCurrentQ(0);
        setQuestions([]);
        setUserAnswers([]);
        setResults([]);
        setLoading(false);
      }, []);

      return (
        <div className="min-h-screen bg-bg-main flex items-start justify-center px-md pt-smd pb-xl">
          <div className="w-full max-w-[420px]">
            <Header onHome={handleHome} />
            {screen === 'start' && (
              <StartScreen onStart={handleStart} />
            )}
            {screen === 'quiz' && questions[currentQ] && (
              <QuestionCard
                key={currentQ}
                questionData={questions[currentQ]}
                questionIndex={currentQ}
                totalQuestions={TOTAL_QUESTIONS}
                onSubmitAnswer={handleSubmitAnswer}
              />
            )}
            {screen === 'results' && (
              <ResultsScreen
                questions={questions}
                results={results}
                onRestart={handleStart}
              />
            )}
            {screen === 'error' && (
              <ErrorScreen message={errorMsg} onRetry={handleStart} />
            )}
          </div>

          {loading && <LoadingModal />}
        </div>
      );
    }

    // ─── Mount ─────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
